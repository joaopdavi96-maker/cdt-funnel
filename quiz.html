  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Diagnóstico — Código da Traição</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C04828;
      --red-light: #fdf2ef;
      --red-border: rgba(192,72,40,0.3);
      --text: #1a1a1a;
      --text-mid: #555;
      --text-muted: #999;
      --border: #e8e8e8;
      --bg: #ffffff;
      --bg-2: #fafafa;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    #quiz-wrap { height: 100svh; display: flex; flex-direction: column; }

    /* HEADER */
    .q-header {
      padding: 1rem 1.4rem 0.9rem;
      background: #fff;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .header-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 0.8rem;
    }
    .app-logo {
      font-size: 0.88rem; font-weight: 600;
      color: var(--text); letter-spacing: -0.2px;
    }
    .app-logo span { color: var(--red); }
    .q-counter-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; }

    .progress-bar-wrap {
      background: #f0f0f0; border-radius: 2px; height: 3px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 3px; background: var(--red); border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* BODY */
    .q-body { flex: 1; overflow-y: auto; padding: 1.8rem 1.4rem 1rem; background: #fff; }

    .q-text {
      font-size: clamp(1.05rem, 4.5vw, 1.3rem);
      font-weight: 600; color: var(--text);
      line-height: 1.35; margin-bottom: 0.6rem;
    }
    .q-subtext {
      font-size: 0.82rem; font-weight: 400;
      color: var(--text-muted); line-height: 1.6; margin-bottom: 1.6rem;
    }

    /* OPÇÕES */
    .options-grid { display: flex; flex-direction: column; gap: 9px; }

    .option-btn {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: #fff;
      cursor: pointer; text-align: left;
      transition: border-color .15s, background .15s;
      width: 100%;
    }
    .option-btn:hover {
      border-color: var(--red-border);
      background: var(--red-light);
    }
    .option-btn.selected {
      border-color: var(--red);
      background: var(--red-light);
    }
    .option-indicator {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px solid #ddd;
      flex-shrink: 0; margin-top: 1px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .option-btn.selected .option-indicator {
      border-color: var(--red); background: var(--red);
    }
    .option-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #fff; opacity: 0;
      transition: opacity .15s;
    }
    .option-btn.selected .option-dot { opacity: 1; }

    .option-label {
      font-size: 0.9rem; font-weight: 500;
      color: var(--text); line-height: 1.45;
    }
    .option-label em {
      display: block; font-size: 0.78rem;
      font-weight: 400; font-style: normal;
      color: var(--text-muted); margin-top: 2px;
    }

    /* TENSION BAR */
    .tension-bar {
      margin-top: 1.2rem;
      padding: 0.9rem 1rem;
      border-left: 3px solid var(--red);
      background: var(--red-light);
      border-radius: 0 8px 8px 0;
      font-size: 0.8rem; color: #6b3520;
      line-height: 1.6; display: none;
    }
    .tension-bar.visible { display: block; }
    .tension-bar strong { color: #4a2010; font-weight: 600; }

    /* FOOTER */
    .q-footer {
      padding: 1rem 1.4rem;
      background: #fff;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .btn-next {
      display: block; width: 100%;
      background: var(--red); color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem; font-weight: 500;
      padding: 15px 24px; border-radius: 10px;
      border: none; cursor: pointer; text-align: center;
      opacity: 0.35; pointer-events: none;
      transition: opacity .2s, transform .1s;
    }
    .btn-next.enabled { opacity: 1; pointer-events: all; }
    .btn-next.enabled:active { transform: scale(0.98); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
<div id="quiz-wrap">

  <header class="q-header">
    <div class="header-top">
      <span class="app-logo">Código da <span>Traição</span></span>
      <span class="q-counter-label" id="q-counter">Pergunta 1 de 7</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </header>

  <div class="q-body" id="q-body">
    <h2 class="q-text" id="q-text"></h2>
    <p class="q-subtext" id="q-subtext"></p>
    <div class="options-grid" id="options-grid"></div>
    <div class="tension-bar" id="tension-bar"></div>
  </div>

  <div class="q-footer">
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Continuar →</button>
  </div>

</div>

<script>
const questions = [
  {
    text: "Nos últimos tempos, ela mudou a forma como usa o celular perto de você?",
    subtext: "Seja honesto. Pequenas mudanças de comportamento são os primeiros sinais que o cérebro percebe — mas que a gente ignora.",
    tension: "<strong>Atenção:</strong> Mudanças no comportamento com o celular estão entre os sinais mais documentados de infidelidade. Não é paranoia — é observação.",
    options: [
      { label: "Sim, claramente", sub: "Tela virada, notificações silenciadas ou esconde o celular", score: 3 },
      { label: "Talvez, não tenho certeza", sub: "Algo mudou mas não sei dizer exatamente o quê", score: 2 },
      { label: "Não percebi nada", sub: "Comportamento normal como sempre foi", score: 0 },
    ]
  },
  {
    text: "Ela ficou mais distante emocionalmente — menos afeto, menos conversas reais?",
    subtext: "Não estamos falando de brigas. Estamos falando daquele frio sutil, daquela sensação de que você perdeu o acesso a ela.",
    tension: "<strong>Distanciamento emocional gradual</strong> é o sinal mais silencioso — e mais ignorado. Porque parece 'fase', parece 'cansaço'. Raramente é.",
    options: [
      { label: "Sim, definitivamente", sub: "Ela parece estar em outro lugar mesmo quando está aqui", score: 3 },
      { label: "Um pouco, mas pode ser estresse", sub: "Percebo algo mas não sei atribuir a uma causa", score: 2 },
      { label: "Não, estamos bem", sub: "A conexão emocional está normal", score: 0 },
    ]
  },
  {
    text: "Ela começou a se importar mais com a própria aparência de forma diferente do habitual?",
    subtext: "Novos cuidados, roupas novas, perfume diferente — especialmente quando não é pra você.",
    tension: "<strong>Mudanças na autoimagem</strong> sem contexto claro frequentemente indicam uma nova audiência. Não é coincidência.",
    options: [
      { label: "Sim, mudou bastante", sub: "Se arruma mais, saídas onde 'não preciso ir bonito'", score: 3 },
      { label: "Talvez um pouco", sub: "Algo diferente mas nada gritante", score: 1 },
      { label: "Não, nada mudou", sub: "Aparência e rotina iguais de sempre", score: 0 },
    ]
  },
  {
    text: "Você já a pegou em alguma mentira — mesmo que pequena e com justificativa rápida?",
    subtext: "Mentiras pequenas criam o hábito da mentira. E quem mente nas pequenas coisas raramente para por aí.",
    tension: "<strong>Mentiras de cobertura</strong> são ensaiadas. Se a justificativa veio rápida e pronta demais, o cérebro dela já estava preparado para essa pergunta.",
    options: [
      { label: "Sim, mais de uma vez", sub: "Histórias que não fecham, lugares que não batem", score: 3 },
      { label: "Uma vez, mas pareceu sem importância", sub: "Algo estranho que ela explicou e eu aceitei", score: 2 },
      { label: "Nunca peguei ela mentindo", sub: "Pelo menos não que eu saiba", score: 1 },
    ]
  },
  {
    text: "A vida sexual entre vocês mudou — seja para muito menos ou de repente muito diferente?",
    subtext: "Tanto a frieza quanto o entusiasmo repentino podem ser sinais. O problema não é a frequência — é a mudança.",
    tension: "<strong>Oscilações bruscas na intimidade</strong> raramente acontecem sem razão. Culpa, comparação, distanciamento afetivo — todos deixam marca.",
    options: [
      { label: "Sim, esfriou completamente", sub: "Ela evita ou está sempre 'cansada'", score: 3 },
      { label: "Ficou diferente, mais intensa sem motivo claro", sub: "Algo mudou mas não sei se é bom ou ruim", score: 2 },
      { label: "Está igual, sem mudanças", sub: "Nada diferente nessa área", score: 0 },
    ]
  },
  {
    text: "Ela tem saídas ou compromissos novos que você não consegue verificar facilmente?",
    subtext: "Academia nova, amiga nova, trabalho que exige mais — tudo pode ser verdade. E tudo pode ser cobertura.",
    tension: "<strong>Alibis que não podem ser checados</strong> são estruturados assim por uma razão. Quanto mais perfeita a justificativa, mais ela foi pensada com antecedência.",
    options: [
      { label: "Sim, tem saídas que não fecham direito", sub: "Horários que não batem, detalhes vagos", score: 3 },
      { label: "Tem algumas coisas novas, mas parece ok", sub: "Novas atividades mas ela comenta normalmente", score: 1 },
      { label: "Não, a rotina dela é transparente", sub: "Sei onde ela está e com quem normalmente", score: 0 },
    ]
  },
  {
    text: "Você tem um sentimento interno — aquela sensação difícil de ignorar — de que algo está errado?",
    subtext: "O instinto humano processa informações antes da consciência. Esse 'algo está errado' raramente aparece do nada.",
    tension: null,
    options: [
      { label: "Sim, e é exatamente por isso que estou aqui", sub: "Não consigo ignorar mais", score: 3 },
      { label: "Tenho dúvidas mas não sei se é real", sub: "Pode ser minha cabeça, pode ser não", score: 2 },
      { label: "Não, estou fazendo isso por prevenção", sub: "Quero estar preparado, não tenho suspeitas fortes", score: 0 },
    ]
  }
];

let current = 0;
let totalScore = 0;
let selectedScore = -1;
const maxScore = questions.reduce((a, q) => a + Math.max(...q.options.map(o => o.score)), 0);

function renderQuestion() {
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `Pergunta ${current + 1} de ${questions.length}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-subtext').textContent = q.subtext;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `
      <span class="option-indicator"><span class="option-dot"></span></span>
      <span class="option-label">${opt.label}${opt.sub ? `<em>${opt.sub}</em>` : ''}</span>`;
    btn.onclick = () => selectOption(i, opt.score);
    grid.appendChild(btn);
  });

  const tb = document.getElementById('tension-bar');
  tb.classList.remove('visible');
  tb.innerHTML = '';
  selectedScore = -1;
  document.getElementById('btn-next').classList.remove('enabled');
  document.getElementById('q-body').scrollTop = 0;
}

function selectOption(idx, score) {
  selectedScore = score;
  document.querySelectorAll('.option-btn').forEach((b, i) => b.classList.toggle('selected', i === idx));
  document.getElementById('btn-next').classList.add('enabled');
  const tb = document.getElementById('tension-bar');
  const tension = questions[current].tension;
  if (tension) { tb.innerHTML = tension; tb.classList.add('visible'); }
}

function nextQuestion() {
  if (selectedScore < 0) return;
  totalScore += selectedScore;
  current++;
  if (current >= questions.length) {
    const scorePercent = Math.round((totalScore / maxScore) * 100);
    // Preserva todos os parâmetros recebidos (UTMs, fbclid, etc.) + adiciona o score calculado
    const params = new URLSearchParams(window.location.search);
    params.set('score', scorePercent);
    window.location.href = `/resultado.html?${params.toString()}`;
  } else {
    renderQuestion();
  }
}

renderQuestion();
</script>
</body>
</html>
